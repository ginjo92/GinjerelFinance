services:
  - type: web
    name: ginjerelfinance
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
